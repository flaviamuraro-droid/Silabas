<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formar Sílabas</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#FFF8DC;
}

h1{
    font-size:55px;
}

#instrucao{
    font-size:45px;
    font-weight:bold;
    margin:30px;
}

.botao{
    font-size:120px;
    width:220px;
    height:220px;
    margin:20px;
    border-radius:30px;
}

#resultado{
    font-size:120px;
    margin-top:30px;
    font-weight:bold;
}

#palavra{
    font-size:60px;
    margin:20px;
}

#proximo{
    font-size:40px;
    padding:20px;
    display:none;
}
</style>
</head>

<body>

<h1>VAMOS FORMAR SÍLABAS!</h1>
<div id="instrucao">CLIQUE NA CONSOANTE</div>

<button id="btn1" class="botao"></button>
<button id="btn2" class="botao"></button>

<div id="resultado"></div>
<div id="palavra"></div>

<button id="proximo" onclick="novaRodada()">PRÓXIMA SÍLABA</button>

<script>
// LISTA DE SÍLABAS + PALAVRAS
const silabas = [
["BA","BANANA"],["BE","BETERRABA"],["BI","BISCOITO"],["BO","BOLO"],["BU","BURRITO"],
["CA","CAMARÃO"],["CE","CEBOLA"],["CO","COGUMELO"],["CU","CUSCUZ"],
["DA","DAMASCO"],["DO","DOCE"],
["FA","FAROFA"],["FE","FEIJÃO"],["FI","FIGO"],["FO","FOGÃO"],
["GA","GALINHA"],["GE","GELO"],["GO","GOIABA"],
["JA","JACA"],["JI","JILÓ"],
["LA","LARANJA"],["LE","LEITE"],["LI","LIMÃO"],["LU","LULA"],
["MA","MACARRÃO"],["ME","MEL"],["MI","MIOJO"],["MO","MOLHO"],
["PA","PAÇOCA"],["PE","PEPINO"],["PI","PIPOCA"],["PO","PORCO"],["PU","PURÊ"],
["RA","RABANETE"],["RI","RICOTA"],["RO","ROMÃ"],
["SA","SALADA"],["SO","SOPA"],
["TA","TABULE"]
];

let consoante;
let vogal;
let silabaAtual;
let palavraAtual;
let clicouConsoante=false;

function falar(texto){
    let fala=new SpeechSynthesisUtterance(texto);
    fala.lang="pt-BR";
    speechSynthesis.speak(fala);
}

function novaRodada(){
    document.getElementById("resultado").innerHTML="";
    document.getElementById("palavra").innerHTML="";
    document.getElementById("proximo").style.display="none";
    document.getElementById("instrucao").innerHTML="CLIQUE NA CONSOANTE";

    clicouConsoante=false;

    // SORTEIA UMA SÍLABA
    let sorteio = silabas[Math.floor(Math.random()*silabas.length)];
    silabaAtual = sorteio[0];
    palavraAtual = sorteio[1];

    consoante = silabaAtual[0];
    vogal = silabaAtual[1];

    // EMBARALHA POSIÇÃO DOS BOTÕES
    if(Math.random() < 0.5){
        btn1.innerHTML = consoante;
        btn2.innerHTML = vogal;
    } else {
        btn1.innerHTML = vogal;
        btn2.innerHTML = consoante;
    }
}

function clicar(letra){
    if(!clicouConsoante){
        // ERRO → clicou vogal primeiro
        if(letra===vogal){
            falar("Vamos tentar novamente. Clique primeiro na consoante.");
            alert("VAMOS TENTAR NOVAMENTE?\nCLIQUE PRIMEIRO NA CONSOANTE");
            novaRodada();
        }
        // ACERTO → clicou consoante
        else{
            clicouConsoante=true;
            falar(consoante);
            document.getElementById("instrucao").innerHTML="AGORA CLIQUE NA VOGAL";
        }
    }
    else{
        // ERRO → clicou consoante de novo
        if(letra===consoante){
            falar("Clique na vogal.");
            alert("AGORA CLIQUE NA VOGAL");
        }
        // ACERTO FINAL 🎉
        else{
            let silaba = consoante+vogal;
            document.getElementById("resultado").innerHTML = silaba;
            document.getElementById("palavra").innerHTML = palavraAtual;

            falar(silaba + " de " + palavraAtual);

            document.getElementById("proximo").style.display="inline";
        }
    }
}

btn1.onclick = () => clicar(btn1.innerHTML);
btn2.onclick = () => clicar(btn2.innerHTML);

novaRodada();
</script>

</body>
</html>
