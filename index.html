<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>JOGO DAS SÍLABAS</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    text-align:center;
    background: linear-gradient(180deg,#fff7cc,#ffd6e7);
    margin:0;
}

/* TÍTULO */
h1{
    font-size:60px;
    color:#ff4d6d;
    margin-top:30px;
}

/* FRASE DE INSTRUÇÃO */
#msg{
    font-size:38px;
    font-weight:bold;
    color:#444;
    margin:20px;
}

/* ÁREA DOS BOTÕES */
.area-botoes{
    margin-top:40px;
}

/* BOTÕES DAS LETRAS */
.letra{
    width:220px;
    height:220px;
    font-size:120px;
    font-weight:bold;
    border:none;
    border-radius:35px;
    margin:40px;
    cursor:pointer;
    transition:0.2s;
    box-shadow:0 8px 0 rgba(0,0,0,0.2);
}

/* CORES */
.consoante{ background:#4da6ff; color:white; }
.vogal{ background:#ff8fab; color:white; }

.letra:active{
    transform:translateY(6px);
    box-shadow:0 2px 0 rgba(0,0,0,0.2);
}

.big{
    font-size:150px;
    color:#06d6a0;
    margin-top:20px;
}

button{
    font-size:28px;
    padding:15px 30px;
    margin:15px;
    border:none;
    border-radius:20px;
    background:#ffd166;
    cursor:pointer;
}
button:hover{ background:#ffca3a; }

</style>
</head>

<body>

<h1>VAMOS FORMAR SÍLABAS!</h1>
<div id="msg">CLIQUE NA CONSOANTE</div>

<div class="area-botoes">
    <button id="btn1" class="letra consoante" onclick="clicar(this.innerText)"></button>
    <button id="btn2" class="letra vogal" onclick="clicar(this.innerText)"></button>
</div>

<div id="resultado"></div>

<script>
const VOGAIS = ["A","E","I","O","U"]

const SILABAS = [
["BA","BANANA"],["BE","BETERRABA"],["BI","BISCOITO"],["BO","BOLO"],["BU","BURRITO"],
["CA","CAMARÃO"],["CE","CEBOLA"],["CO","COGUMELO"],["CU","CUSCUZ"],
["DA","DAMASCO"],["DO","DOCE"],
["FA","FAROFA"],["FE","FEIJÃO"],["FI","FIGO"],["FO","FOGÃO"],
["GA","GALINHA"],["GE","GELO"],["GO","GOIABA"],
["JA","JACA"],["JI","JILÓ"],
["LA","LARANJA"],["LE","LEITE"],["LI","LIMÃO"],["LU","LULA"],
["MA","MACARRÃO"],["ME","MEL"],["MI","MIOJO"],["MO","MOLHO"],
["PA","PAÇOCA"],["PE","PEPINO"],["PI","PIPOCA"],["PO","PORCO"],["PU","PURÊ"],
["RA","RABANETE"],["RI","RICOTA"],["RO","ROMÃ"],
["SA","SALADA"],["SO","SOPA"],
["TA","TABULE"]
]

function falar(texto){
    const msg = new SpeechSynthesisUtterance(texto)
    msg.lang="pt-BR"
    msg.rate=0.7
    speechSynthesis.speak(msg)
}

function gerarRodada(){
    const sorteio=SILABAS[Math.floor(Math.random()*SILABAS.length)]
    sessionStorage.setItem("silabaAtual",JSON.stringify(sorteio))
    sessionStorage.setItem("estado","consoante")
}

function carregarRodada(){
    let rodada=sessionStorage.getItem("silabaAtual")
    if(!rodada){gerarRodada(); rodada=sessionStorage.getItem("silabaAtual")}
    return JSON.parse(rodada)
}

let estado=sessionStorage.getItem("estado")||"consoante"
let rodada=carregarRodada()

const silaba=rodada[0]
const palavra=rodada[1]
const CONSOANTE=silaba[0]
const VOGAL=silaba[1]

document.getElementById("btn1").innerText=CONSOANTE
document.getElementById("btn2").innerText=VOGAL

function clicar(letra){
    const msg=document.getElementById("msg")

    if(estado==="consoante"){
        if(VOGAIS.includes(letra)){
            msg.innerHTML="VAMOS TENTAR NOVAMENTE?<br>CLIQUE PRIMEIRO NA <b>CONSOANTE</b>"
            falar("Tente novamente")
            return
        }
        estado="vogal"
        sessionStorage.setItem("estado","vogal")
        msg.innerHTML="AGORA CLIQUE NA VOGAL!"
        falar(CONSOANTE)
        return
    }

    if(estado==="vogal"){
        if(!VOGAIS.includes(letra)) return

        document.getElementById("resultado").innerHTML=
        `<div class="big">${silaba}</div>
         <h2>${palavra}</h2>
         <button onclick="falar('${silaba}')">🔊 OUVIR SÍLABA</button>
         <button onclick="proxima()">PRÓXIMA SÍLABA</button>`

        falar(silaba)
    }
}

function proxima(){
    sessionStorage.clear()
    location.reload()
}
</script>

</body>
</html>
