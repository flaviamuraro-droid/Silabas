<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>JOGO DAS SÍLABAS</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background: linear-gradient(180deg,#fff7cc,#ffd6e7);
}

h1{ font-size:60px; color:#ff4d6d; }
#msg{ font-size:38px; font-weight:bold; margin:20px; }

.letra{
    width:220px;height:220px;font-size:120px;
    border:none;border-radius:35px;margin:40px;
    color:white;cursor:pointer;
    box-shadow:0 8px 0 rgba(0,0,0,0.2);
}
.consoante{background:#4da6ff;}
.vogal{background:#ff8fab;}

.big{font-size:150px;color:#06d6a0;}

img{
    width:300px;
    margin-top:20px;
    border-radius:20px;
}
button{
    font-size:28px;padding:15px 30px;margin:15px;
    border:none;border-radius:20px;background:#ffd166;
}
</style>
</head>

<body>

<h1>VAMOS FORMAR SÍLABAS!</h1>
<div id="msg">CLIQUE NA CONSOANTE</div>

<button id="btn1" class="letra consoante" onclick="clicar(this.innerText)"></button>
<button id="btn2" class="letra vogal" onclick="clicar(this.innerText)"></button>

<div id="resultado"></div>

<script>
const VOGAIS=["A","E","I","O","U"]

const SILABAS=[
["BA","BANANA"],["BE","BETERRABA"],["BI","BISCOITO"],["BO","BOLO"],["BU","BURRITO"],
["CA","CAMARÃO"],["CE","CEBOLA"],["CO","COGUMELO"],["CU","CUSCUZ"],
["DA","DAMASCO"],["DO","DOCE"],
["FA","FAROFA"],["FE","FEIJÃO"],["FI","FIGO"],["FO","FOGÃO"],
["GA","GALINHA"],["GE","GELO"],["GO","GOIABA"],
["JA","JACA"],["JI","JILÓ"],
["LA","LARANJA"],["LE","LEITE"],["LI","LIMÃO"],["LU","LULA"],
["MA","MACARRÃO"],["ME","MEL"],["MI","MIOJO"],["MO","MOLHO"],
["PA","PAÇOCA"],["PE","PEPINO"],["PI","PIPOCA"],["PO","PORCO"],["PU","PURÊ"],
["RA","RABANETE"],["RI","RICOTA"],["RO","ROMÃ"],
["SA","SALADA"],["SO","SOPA"],
["TA","TABULE"]
]

function limparAcentos(texto){
    return texto.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase()
}

function falarSilaba(s){
    let msg=new SpeechSynthesisUtterance("SÍLABA "+s)
    msg.lang="pt-BR"
    speechSynthesis.cancel()
    speechSynthesis.speak(msg)
}

function gerarRodada(){
    const s=SILABAS[Math.floor(Math.random()*SILABAS.length)]
    sessionStorage.setItem("silabaAtual",JSON.stringify(s))
    sessionStorage.setItem("estado","consoante")
}
function carregarRodada(){
    let r=sessionStorage.getItem("silabaAtual")
    if(!r){gerarRodada(); r=sessionStorage.getItem("silabaAtual")}
    return JSON.parse(r)
}

let estado=sessionStorage.getItem("estado")||"consoante"
let rodada=carregarRodada()

const silaba=rodada[0]
const palavra=rodada[1]
const CONSOANTE=silaba[0]
const VOGAL=silaba[1]

btn1.innerText=CONSOANTE
btn2.innerText=VOGAL

function clicar(letra){
    const msg=document.getElementById("msg")

    if(estado==="consoante"){
        if(VOGAIS.includes(letra)){
            msg.innerHTML="TENTE NOVAMENTE!<br>CLIQUE NA <b>CONSOANTE</b>"
            return
        }
        estado="vogal"
        sessionStorage.setItem("estado","vogal")
        msg.innerHTML="AGORA CLIQUE NA VOGAL!"
        return
    }

    if(estado==="vogal"){
        if(!VOGAIS.includes(letra)) return

        let nomeImagem=limparAcentos(palavra)

        resultado.innerHTML=
        `<div class="big">${silaba}</div>
         <h2>${palavra}</h2>
         <img src="imagens/${nomeImagem}.png">
         <br>
         <button onclick="falarSilaba('${silaba}')">🔊 OUVIR SÍLABA</button>
         <button onclick="proxima()">PRÓXIMA SÍLABA</button>`

        falarSilaba(silaba)
    }
}

function proxima(){
    sessionStorage.clear()
    location.reload()
}
</script>

</body>
</html>
